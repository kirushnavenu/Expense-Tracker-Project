<!DOCTYPE html>
<html>
<head>
    <title>Core Js Expense Tracker</title>
    <link rel="stylesheet"href="style.css">
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        <div class="list">
            <input type="text" id="Description"  required placeholder="Description"><br><br>
            <input type="number" id="Amount"  required placeholder="Amount"><br><br>
            <button id="Add Transtaion">Add Transtaion</button><br><br>
        </div>
        <h2 class="balance">Total Balance:$ <span id="balance">0</span></h2>
        <h3>Transtaion History</h3>
        <ul id="transtation-list">
            <li class="incom">Income<input class="button-1" type="number"required placeholder="$0.00"></li>
            
            <li class="exspense">Expense<input class="button-2" type="number"required placeholder="$0.00"></li>
        </ul>
    </div>
    <script src="script.js"></script>



</body>
</html>
